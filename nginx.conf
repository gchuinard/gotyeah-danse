server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index desha-moulin.html;

    gzip on;
    gzip_types text/html text/css application/javascript image/png image/jpeg image/svg+xml font/woff2;
    gzip_min_length 1024;

    location ~* \.(css|js|png|jpg|jpeg|svg|woff2|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /desha-moulin.html;
    }
}
